---
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

formats:
  - htmlzip

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"

python:
  install:
    - method: uv
      command: sync
      groups:
        - docs
