name: update dev deps

"on":
  schedule:
    # First day of every third month at noon
    - cron: "0 12 1 */3 *"
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - name: check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      # - name: set up upterm session
      #   uses: lhotari/action-upterm@v1
      - name: update development dependencies
        run: nix develop .#update_deps --command bash -c './update_dev_dependencies'
      - name: create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.DEV_DEPS_UPDATE_TOKEN }}
          title: Update development dependencies
          labels: automated,dependencies
          commit-message: Update dev dependencies.
          branch: deps

permissions:
  contents: read
  pull-requests: write
