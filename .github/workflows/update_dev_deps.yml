name: update dev deps

"on":
  schedule:
    # First day of every third month at noon
    - cron: "0 12 1 */3 *"
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-24.04
    steps:
      - name: check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25
      # - name: set up upterm session
      #   uses: lhotari/action-upterm@v1
      - name: update development dependencies
        run: nix develop --command bash -c './update_dev_dependencies'
      - name: create PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          token: ${{ secrets.DEV_DEPS_UPDATE_TOKEN }}
          title: Update development dependencies
          labels: automated,dependencies
          commit-message: Update dev dependencies.
          branch: deps

permissions:
  contents: read
  pull-requests: write
