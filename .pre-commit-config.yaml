exclude: ^\.benchmarks

repos:
  - repo: builtin
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://gitlab.com/bmares/check-json5
    rev: v1.0.1
    hooks:
      - id: check-json5

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-crlf
      - id: remove-crlf
      - id: forbid-tabs
      - id: remove-tabs

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["--uri-ignore-words-list", "*"]  # https://github.com/codespell-project/codespell/issues/2473

  - repo: https://github.com/adhtruong/mirrors-typos
    rev: v1.48.0
    hooks:
      - id: typos
        args: [--write-changes]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          - hypothesis
          - pytest

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        exclude: ^.envrc$

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path rust/bidict_base_opt_native/Cargo.toml --check
        language: system
        files: ^rust/bidict_base_opt_native/
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: cargo check --manifest-path rust/bidict_base_opt_native/Cargo.toml --locked
        language: system
        files: ^rust/bidict_base_opt_native/
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: >-
          bash -c 'export RUSTC="$(command -v rustc)";
          export RUSTC_WORKSPACE_WRAPPER="$(command -v clippy-driver)";
          export RUSTFLAGS="-D warnings";
          cargo check --manifest-path rust/bidict_base_opt_native/Cargo.toml --locked --all-targets'
        language: system
        files: ^rust/bidict_base_opt_native/
        pass_filenames: false
